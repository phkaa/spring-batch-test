spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  hikari:
    pool-name: BatchHikariPool
    maximum-pool-size: 10
    minimum-idle: 5
    idle-timeout: 30000
    connection-timeout: 20000
    max-lifetime: 1800000

  sql:
    init:
      mode: always
      encoding: UTF-8

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.batch.core: INFO
    org.springframework.batch.core.step.AbstractStep: INFO
    com.zaxxer.hikari: WARN
    org.springframework.jdbc.core.StatementCreatorUtils: OFF